# sprig-lint configuration
# Place this file at the root of your repository or at ~/.sprig-lint.cfg
#
# Validation rules use a severity level: error | warn | off
#   error  -> printed in red, fails the commit (exit 1)
#   warn   -> printed in yellow, does NOT fail
#   off    -> rule is disabled

# --- Severity rules ---

# Subject must follow `<type>[(scope)][!]: <description>` (default: error)
# format=error

# Type must be lowercase ASCII letters only (default: error)
# type_case=error

# Type must be in `allowed_types` (default: error)
# type_allowed=error

# Scope is required, e.g. `feat(core): ...` (default: off)
# scope_required=off

# Empty scope `()` is rejected (default: error)
# scope_empty=error

# Description must not be empty or whitespace-only (default: error)
# description_empty=error

# Subject length must be within `max_subject_length` (default: error)
# subject_max_length=error

# Subject must not end with a period (default: off)
# subject_full_stop=off

# Description must not start with a capital letter (default: off)
# subject_leading_capital=off

# Body lines must be within `max_body_line_length` (default: off)
# body_max_line_length=off

# --- Values ---

# Comma-separated list of allowed conventional commit types
# allowed_types='feat,fix,chore,refactor,docs,test,style,perf,build,ci,revert'

# Maximum subject line length. Set to 0 to disable.
# max_subject_length=72

# Maximum body line length. Set to 0 to disable.
# max_body_line_length=100

# --- Toggles ---

# Allow auto-generated merge commits (subjects starting with "Merge ")
# allow_merge_commits=true

# Allow auto-generated revert commits (subjects starting with "Revert ")
# allow_revert_commits=true

# Allow fixup/squash/amend commits (e.g. "fixup! foo")
# allow_fixup_commits=true

# Regex of branches to skip in hook mode (rarely useful for commit-msg)
# ignored_branches='^$'
